services:
  web:
    build:
      context: .
      dockerfile: services/web/Dockerfile
    container_name: quiz-web
    ports:
      - "3000:3000"
    environment:
      INTERNAL_API_ORIGIN: ${INTERNAL_API_ORIGIN:-http://api:4000}
      NEXT_PUBLIC_QUIZ_QUESTION_LIMIT: ${NEXT_PUBLIC_QUIZ_QUESTION_LIMIT:-10}
    depends_on:
      api:
        condition: service_healthy

  api:
    build:
      context: ./services/api
      dockerfile: Dockerfile
    container_name: quiz-api
    environment:
      API_PORT: ${API_PORT:-4000}
      DATABASE_URL: ${DATABASE_URL:-postgres://quiz:quiz@db:5432/quiz_app}
      QUIZ_QUESTION_LIMIT: ${QUIZ_QUESTION_LIMIT:-10}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://localhost:' + (process.env.API_PORT || 4000) + '/api/v1/health').then(r => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  db:
    image: postgres:16-alpine
    container_name: quiz-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-quiz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quiz}
      POSTGRES_DB: ${POSTGRES_DB:-quiz_app}
    volumes:
      - db-data:/var/lib/postgresql/data
      - ./services/db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quiz} -d ${POSTGRES_DB:-quiz_app}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s

volumes:
  db-data: